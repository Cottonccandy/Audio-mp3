<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Host 🎵</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #fdf2f8; }
        .card { background: white; padding: 2.5rem; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; width: 90%; max-width: 400px; border: 1px solid #fbcfe8; }
        h2 { color: #db2777; margin-bottom: 1.5rem; }
        .upload-area { border: 2px dashed #f472b6; padding: 20px; border-radius: 15px; background: #fff1f2; margin-bottom: 20px; }
        input[type="file"] { margin: 10px 0; width: 100%; font-size: 14px; }
        button { background: #ec4899; color: white; border: none; padding: 12px 25px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background: #db2777; transform: translateY(-2px); }
        #status { margin-top: 20px; font-size: 14px; color: #666; line-height: 1.5; }
        #linkBox { margin-top: 15px; padding: 12px; background: #f8fafc; border-radius: 10px; border: 1px solid #e2e8f0; word-break: break-all; display: none; font-size: 11px; cursor: pointer; color: #1e293b; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🎵 Audio Host</h2>
        <div class="upload-area">
            <input type="file" id="fileInput" accept="audio/mpeg">
        </div>
        <button onclick="upload()">อัปโหลดไฟล์ MP3</button>
        <div id="status">เลือกไฟล์เสียงเพื่อรับลิงก์สำหรับ SillyTavern</div>
        <div id="linkBox" onclick="copyLink()" title="คลิกเพื่อคัดลอก"></div>
    </div>

    <script>
        async function upload() {
            const fileInput = document.getElementById('fileInput');
            const status = document.getElementById('status');
            const linkBox = document.getElementById('linkBox');

            if (!fileInput.files[0]) return alert("ลืมเลือกไฟล์หรือเปล่าครับ?");

            const file = fileInput.files[0];
            const reader = new FileReader();
            status.innerHTML = "⏳ กำลังส่งไฟล์ไป GitHub...<br>อย่าเพิ่งปิดหน้านี้นะครับ";

            reader.onload = async () => {
                const base64Content = reader.result.split(',')[1];
                try {
                    const response = await fetch('/api/upload', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            fileName: Date.now() + "_" + file.name.replace(/\s+/g, '_'), 
                            content: base64Content 
                        })
                    });

                    const result = await response.json();
                    if (response.ok) {
                        status.innerHTML = "✅ อัปโหลดสำเร็จ!<br>คลิกที่แถบด้านล่างเพื่อคัดลอกลิงก์";
                        linkBox.style.display = "block";
                        linkBox.innerText = result.url;
                    } else {
                        status.innerText = "❌ เกิดข้อผิดพลาด: " + (result.error || "ลองใหม่อีกครั้งครับ");
                    }
                } catch (e) {
                    status.innerText = "❌ เชื่อมต่อเซิร์ฟเวอร์ไม่ได้ครับ";
                }
            };
            reader.readAsDataURL(file);
        }

        function copyLink() {
            const text = document.getElementById('linkBox').innerText;
            navigator.clipboard.writeText(text);
            alert("คัดลอกลิงก์เรียบร้อย! เอาไปใส่ใน SillyTavern ได้เลยครับ");
        }
    </script>
</body>
</html>
